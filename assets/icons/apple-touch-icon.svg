<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <pattern id="stripes-apple" patternUnits="userSpaceOnUse" width="180" height="24">
      <rect width="180" height="16" fill="#0a0a0a"/>
      <rect y="16" width="180" height="8" fill="transparent"/>
    </pattern>
    <clipPath id="vs-clip-apple">
      <text x="20" y="130" font-family="Arial, sans-serif" font-size="120" font-weight="700" letter-spacing="-0.03em">VS</text>
    </clipPath>
  </defs>
  <rect width="180" height="180" fill="#fafafa"/>
  <g clip-path="url(#vs-clip-apple)">
    <rect x="0" y="0" width="180" height="180" fill="url(#stripes-apple)"/>
  </g>
</svg>
