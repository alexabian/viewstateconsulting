<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="stripes-og" patternUnits="userSpaceOnUse" width="1200" height="18">
      <rect width="1200" height="12" fill="#0a0a0a"/>
      <rect y="12" width="1200" height="6" fill="transparent"/>
    </pattern>
    <clipPath id="logo-clip-og">
      <text x="80" y="200" font-family="Arial, sans-serif" font-size="80" font-weight="700" letter-spacing="0.02em">VIEWSTATE</text>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#fafafa"/>

  <!-- Striped Logo -->
  <g clip-path="url(#logo-clip-og)">
    <rect x="0" y="0" width="1200" height="630" fill="url(#stripes-og)"/>
  </g>

  <!-- Tagline -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="24" font-weight="400" fill="#6a6a6a">IT Infrastructure &amp; Technology Leadership</text>

  <!-- Divider -->
  <rect x="80" y="320" width="200" height="2" fill="#0a0a0a"/>

  <!-- Subtitle -->
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#2a2a2a">Expert consulting for growing companies</text>
  <text x="80" y="410" font-family="Arial, sans-serif" font-size="20" font-weight="400" fill="#2a2a2a">Dubai-based · Global reach</text>

  <!-- Stats -->
  <text x="80" y="520" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#6a6a6a" letter-spacing="0.1em">15+ YEARS · 600+ USERS · 10+ COUNTRIES</text>

  <!-- Website URL -->
  <text x="80" y="580" font-family="Arial, sans-serif" font-size="16" font-weight="500" fill="#0a0a0a">viewstate.ae</text>
</svg>
