<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60">
  <defs>
    <!-- Horizontal stripe pattern for IBM-style effect -->
    <pattern id="stripes-black" patternUnits="userSpaceOnUse" width="100%" height="12">
      <rect width="100%" height="8" fill="#0a0a0a"/>
      <rect y="8" width="100%" height="4" fill="transparent"/>
    </pattern>
    <clipPath id="text-clip">
      <text x="0" y="48" font-family="'DM Sans', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="0.02em">VIEWSTATE</text>
    </clipPath>
  </defs>
  <!-- Striped text effect -->
  <g clip-path="url(#text-clip)">
    <rect x="0" y="0" width="400" height="60" fill="url(#stripes-black)"/>
  </g>
</svg>
