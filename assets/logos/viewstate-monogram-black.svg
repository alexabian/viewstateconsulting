<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <!-- Horizontal stripe pattern for IBM-style effect -->
    <pattern id="stripes-mono-black" patternUnits="userSpaceOnUse" width="100%" height="14">
      <rect width="100%" height="10" fill="#0a0a0a"/>
      <rect y="10" width="100%" height="4" fill="transparent"/>
    </pattern>
    <clipPath id="mono-clip-black">
      <text x="4" y="62" font-family="'DM Sans', Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-0.02em">VS</text>
    </clipPath>
  </defs>
  <!-- Striped text effect -->
  <g clip-path="url(#mono-clip-black)">
    <rect x="0" y="0" width="80" height="80" fill="url(#stripes-mono-black)"/>
  </g>
</svg>
