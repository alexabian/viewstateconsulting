<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <!-- Horizontal stripe pattern for IBM-style effect -->
    <pattern id="stripes-stacked-white" patternUnits="userSpaceOnUse" width="100%" height="12">
      <rect width="100%" height="8" fill="#fafafa"/>
      <rect y="8" width="100%" height="4" fill="transparent"/>
    </pattern>
    <clipPath id="stacked-clip-white">
      <text x="0" y="48" font-family="'DM Sans', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="0.02em">VIEW</text>
      <text x="0" y="108" font-family="'DM Sans', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="0.02em">STATE</text>
    </clipPath>
  </defs>
  <!-- Striped text effect -->
  <g clip-path="url(#stacked-clip-white)">
    <rect x="0" y="0" width="200" height="120" fill="url(#stripes-stacked-white)"/>
  </g>
</svg>
